<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloG - Glassic Login Form</title>

    <!-- GloG styles -->
    <link rel="stylesheet" href="./assets/styles/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="wrapper">
        <!-- Left Panel -->
        <section class="register">

            <div class="logo">
                <i class="fa fa-layer-group"></i>
                <span class="matn">GloG UI</span>
            </div>

            <form action="javascript:void(0)" class="login-form">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" placeholder="Farzad Asgari" name="fullname" id="fullname">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" placeholder="khufarzadasgari@gmail.com" name="email" id="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" placeholder="******" name="password" id="password">
                </div>

                <div class="options">
                    <label for="terms" class="remember">
                        <input type="checkbox" name="terms" id="terms">
                        I agree to Terms
                    </label>
                </div>

                <button class="register-btn">
                    Create Account
                </button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="socials">
                <button>
                    <i class="fa-brands fa-google"></i>
                    Google
                </button>
                <button>
                    <i class="fa-brands fa-linkedin"></i>
                    LinkedIn
                </button>

                <button>
                    <i class="fa-brands fa-github"></i>
                    GitHub
                </button>
            </div>

            <p class="login-link">
                Already have an account?
                <a href="javascript:void(0)">Sign In</a>
            </p>

        </section>

        <!-- Right Panel -->
        <section class="gallery">
            <div class="card card1">
                <img src="assets/images/1.webp" alt="">
            </div>
            <div class="card card2">
                <img src="assets/images/2.webp" alt="">
            </div>
            <div class="card card3">
                <img src="assets/images/3.webp" alt="">
            </div>
            <div class="card card4">
                <img src="assets/images/4.webp" alt="">
            </div>
            <div class="card card5">
                <img src="assets/images/5.webp" alt="">
            </div>
        </section>
    </div>
</body>

</html>
